name: Hourly mutation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: hourly-mutation
  cancel-in-progress: false

jobs:
  mutate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate new hourly state
        run: |
          npm run generate

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "branch=hourly/$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, and push
        if: steps.diff.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.diff.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/hourly.json data/archive.json
          git commit -m "art: hourly mutation $(date -u +%Y-%m-%dT%H:00Z)"
          git push origin "$BRANCH"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.diff.outputs.branch }}
        run: |
          URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "art: hourly mutation $(date -u +%Y-%m-%d %H:00 UTC)" \
            --body "Automated hourly mutation for the site.")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Merge PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge --squash --delete-branch "${{ steps.pr.outputs.url }}"
